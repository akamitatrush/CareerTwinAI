version: 2

# Dependabot — atualizacoes automaticas de seguranca + manutencao.
# Audit 04-appsec-owasp.md A06 apontou ausencia. Sem isso, deps vulneraveis
# (next-auth beta, pdf-parse, mammoth) acumulam sem PR de upgrade.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Agrupa minor+patch num PR so — evita ruido de 15 PRs/semana.
      # Major fica em PR separado pra revisao manual (breaking changes).
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Ignora MAJOR upgrades que sabemos quebrar build/produto.
    # Prisma 7: removeu `url` de datasource (precisa prisma.config.ts).
    #   Reavaliar quando estabilizar + tivermos tempo de migrar.
    # Next 15: app router mudancas + React 19 RC.
    # next-auth 6: aguarda stable saido do beta.
    ignore:
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next-auth"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@auth/prisma-adapter"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "stripe"
        update-types: ["version-update:semver-major"]
    labels:
      - "deps"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci"
