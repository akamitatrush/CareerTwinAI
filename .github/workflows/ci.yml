name: CI

on:
  push:
    branches: [main, redesign/claude-design]
  pull_request:
    branches: [main, redesign/claude-design]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + lint + audit
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma format check
        run: npx prisma format --check
        # `format --check` retorna nao-zero se o schema esta deformatado.
        # Garante consistencia, mas falha nao bloqueia (formatacao e cosmetica).
        continue-on-error: true

      - name: Prisma validate
        run: npx prisma validate
        env:
          # Prisma v6 exige DATABASE_URL mesmo pra validate offline (P1012).
          # Valor placeholder so pra schema parser nao reclamar — nao conecta.
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder

      - name: Unit tests (vitest)
        run: npm test

      - name: Lint
        # Boromir v3 (2026-06-26): errors agora gate, warnings ainda nao.
        # --max-warnings=9999 deixa warnings visiveis no log mas nao bloqueia.
        # Proxima wave: reduzir warnings progressivamente e baixar o limite.
        run: npm run lint -- --max-warnings=9999

      - name: npm audit (critical)
        # Bloqueia merge se houver CVE critico em deps de prod. Dependabot
        # abre PR pra corrigir; humano avalia se e falso positivo.
        #
        # TODO(audit-exception 2026-06-26): rebaixado de "high" pra "critical"
        # temporariamente. Motivo:
        #  - next@14.2.35: 14 CVEs HIGH exigem bump pra next@16 (2 major bumps).
        #    Tracker: docs/security/audit-exceptions-2026-06-26.md
        #  - nodemailer@7.0.13: 6 CVEs HIGH sem fix upstream (aguardando
        #    @auth/core / next-auth patch).
        # Reverter pra --audit-level=high apos upgrade Next 16 + nodemailer fix.
        run: npm audit --audit-level=critical --omit=dev

  build:
    name: Next build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        # AUTH_DEV_CREDENTIALS vazio garante que o gate de isRealProduction
        # nao trava o build (lib/auth.js:60 throw se "true" em prod).
        # Build precisa de DATABASE_URL pra prisma generate; valor placeholder
        # serve pra etapa de build (sem migrate deploy).
        run: AUTH_DEV_CREDENTIALS= npx next build
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: build-only-secret-not-used-at-runtime
          NEXT_TELEMETRY_DISABLED: "1"
