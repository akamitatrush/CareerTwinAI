name: E2E

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled, synchronize]
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Em PRs, só roda se a label "e2e" estiver presente (e2e é caro: ~3-5min).
    # Sempre roda em push pra main.
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: careertwin
          POSTGRES_PASSWORD: careertwin
          POSTGRES_DB: careertwin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U careertwin -d careertwin"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://careertwin:careertwin@localhost:5432/careertwin
      AUTH_SECRET: test-secret-for-ci-only-not-used-in-prod
      AUTH_URL: http://localhost:3000
      AUTH_DEV_CREDENTIALS: "true"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: pw-${{ runner.os }}-

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
